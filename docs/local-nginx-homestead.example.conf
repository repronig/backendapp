# Example Homestead / nginx site for api.repronig.local
# Symptom: every /api/v1/* request returns nginx 404 (HTML), including OPTIONS preflight.
# Fix: point root at this Laravel app's public/ folder and route PHP to index.php.

server {
    listen 80;
    listen 443 ssl http2;
    server_name api.repronig.local;
    root /home/vagrant/code/repronig/api.repronig/public;

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
